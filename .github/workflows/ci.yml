name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  schedule:
    - cron: "0 2 * * *"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  guard-pr-to-dev:
    name: Guard PR -> dev
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    steps:
      - name: Check source branch
        shell: bash
        run: |
          echo "Source: ${{ github.head_ref }}"
          case "${{ github.head_ref }}" in
            main)
              echo "Allowed: main -> dev"
              ;;
            hotfix/*|dev)
              echo "Forbidden source branch -> dev"
              exit 1
              ;;
            *)
              echo "Allowed: feature/* -> dev"
              ;;
          esac

  guard-pr-to-main:
    name: Guard PR -> main
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Check source branch
        shell: bash
        run: |
          echo "Source: ${{ github.head_ref }}"
          case "${{ github.head_ref }}" in
            dev|hotfix/*)
              echo "Allowed"
              ;;
            *)
              echo "Only dev or hotfix/* -> main"
              exit 1
              ;;
          esac

  lint-pr-to-dev:
    name: Lint PR -> dev
    runs-on: ubuntu-latest
    needs: guard-pr-to-dev
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    container:
      image: silkeh/clang:15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Lint
        shell: bash
        run: |
          ./scripts/linux/run clean
          ./scripts/linux/run format
          ./scripts/linux/run tidy

  test-linux-pr-to-dev:
    name: Linux test PR -> dev
    runs-on: ubuntu-latest
    needs: guard-pr-to-dev
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    container:
      image: buildpack-deps:bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        shell: bash
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3 python3-venv

      - name: Build and test
        shell: bash
        run: |
          ./scripts/linux/run clean
          ./scripts/linux/run build --debug
          ./scripts/linux/run run-unittest

  test-linux-pr-to-main:
    name: Linux release test PR -> main
    runs-on: ubuntu-latest
    needs: guard-pr-to-main
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    container:
      image: buildpack-deps:bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        shell: bash
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3 python3-venv

      - name: Release build and test
        shell: bash
        run: |
          ./scripts/linux/run clean
          ./scripts/linux/run build --release
          ./scripts/linux/run run-unittest

  nightly-dev:
    name: Nightly dev validations
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    container:
      image: buildpack-deps:bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: dev

      - name: Install deps
        shell: bash
        run: |
          apt-get update
          apt-get install -y cmake ninja-build lcov python3 python3-venv

      - name: Big validations
        shell: bash
        run: |
          ./scripts/linux/run clean
          ./scripts/linux/run build --release
          ./scripts/linux/run py-deps
          source .venv/bin/activate
          ./scripts/linux/run coverage --all

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-coverage-html
          path: build/coverage/html/
          if-no-files-found: error

  release-guard:
    name: Release guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check tag format
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Tag: $TAG"
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*)
              echo "Valid tag"
              ;;
            *)
              echo "Tag must be vX.Y.Z"
              exit 1
              ;;
          esac

      - name: Check tag commit is on main
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  release-linux:
    name: Release Linux build
    runs-on: ubuntu-latest
    needs: release-guard
    if: startsWith(github.ref, 'refs/tags/')
    container:
      image: buildpack-deps:bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        shell: bash
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3 python3-venv

      - name: Build release Linux
        shell: bash
        run: |
          ./scripts/linux/run clean
          ./scripts/linux/run build --release
          ./scripts/linux/run run-unittest

      - uses: actions/upload-artifact@v4
        with:
          name: tucuxi-cdss-cli-linux
          path: build/release/main/tucuxi_cdss_cli
          if-no-files-found: error

  release-windows:
    name: Release Windows build
    runs-on: windows-latest
    needs: release-guard
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build release Windows
        shell: pwsh
        run: |
          .\scripts\win\run.ps1 clean
          .\scripts\win\run.ps1 build --release
          .\scripts\win\run.ps1 gtest

      - uses: actions/upload-artifact@v4
        with:
          name: tucuxi-cdss-cli-windows
          path: build\release\main\tucuxi_cdss_cli.exe
          if-no-files-found: error
    
  release-macos:
    name: Release macOS build
    runs-on: macos-latest
    needs: release-guard
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        shell: bash
        run: |
          brew install cmake ninja

      - name: Build release macOS
        shell: bash
        run: |
          ./scripts/linux/run clean
          ./scripts/linux/run build --release
          ./scripts/linux/run run-unittest

      - uses: actions/upload-artifact@v4
        with:
          name: tucuxi-cdss-cli-macos
          path: build/release/main/tucuxi_cdss_cli
          if-no-files-found: error
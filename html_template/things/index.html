<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="application/json" id="jsonData">
      {{ json_dump }}
    </script>
    <title>Tucuxi report file</title>

    <!-- INLINE_CSS:css/style.css -->

    <!-- INLINE_JS:drawGraph.js -->
    <!-- INLINE_JS:graphcreator.js -->
    <!-- INLINE_JS:graphdata.js -->
    <!-- INLINE_JS:graphing.js -->
    <!-- INLINE_JS:handle_input.js -->

    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.03), transparent 260px);
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 18px;
      }

      .hero {
        border-radius: 20px;
        padding: 18px 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: white;
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }

      .logos {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .img-logo {
        height: 42px;
        width: auto;
      }

      .hero-title {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .hero-title h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 800;
      }
      .hero-title p {
        margin: 0;
        opacity: 0.75;
        font-size: 13px;
      }

      .hero-kpis {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 760px) {
        .hero {
          grid-template-columns: 1.2fr 0.8fr;
          align-items: start;
        }
        .hero-kpis {
          grid-template-columns: 1fr;
        }
      }

      .pill {
        border-radius: 999px;
        padding: 8px 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(0, 0, 0, 0.02);
        font-size: 13px;
      }

      .sections {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .panel {
        border-radius: 18px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: #fff;
        overflow: hidden;
      }
      .panel-head {
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        font-weight: 800;
      }
      .panel-head small {
        opacity: 0.7;
        font-weight: 600;
      }
      .panel-body {
        padding: 14px;
      }

      .meta {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 760px) {
        .meta {
          grid-template-columns: 1fr 1fr;
        }
      }

      .meta .field {
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 14px;
        padding: 10px 12px;
      }
      .meta .label {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 4px;
      }
      .meta .value {
        font-weight: 650;
        word-break: break-word;
      }

      .cov-table table {
        width: 100%;
        border-collapse: collapse;
      }
      .cov-table th,
      .cov-table td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        vertical-align: top;
      }
      .cov-table thead th {
        font-size: 12px;
        opacity: 0.7;
      }

      .warnings-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 12px;
      }
      @media (min-width: 900px) {
        .warnings-row {
          grid-template-columns: 1fr 1fr 1fr;
        }
      }

      .warnings-section {
        border-radius: 16px;
        padding: 10px 12px;
        border: 1px dashed rgba(0, 0, 0, 0.18);
        background: rgba(0, 0, 0, 0.015);
      }
      .warnings-section h3 {
        margin: 0 0 8px;
        font-size: 13px;
      }
      .warnings-section ul {
        margin: 0;
        padding-left: 18px;
      }

      /* Results block */
      .results {
        margin-top: 14px;
        border-radius: 20px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: #fff;
        overflow: hidden;
      }
      .results-head {
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        font-weight: 900;
      }
      .results-body {
        padding: 14px;
        display: grid;
        gap: 12px;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <!-- HERO -->
      <section class="hero">
        <div>
          <div class="hero-top">
            <div class="logos">
              <img
                class="img-logo"
                src="<!-- INLINE_IMG:assets/hospital_logo.txt -->"
                alt="Hospital logo"
              />
              <img
                class="img-logo"
                src="<!-- INLINE_IMG:assets/tucuxi_logo.txt -->"
                alt="Tucuxi logo"
              />
            </div>

            <div class="pill">
              <span id="report_date_translate"></span> <span id="reportDate">?</span>
            </div>
          </div>

          <div class="hero-title" style="margin-top: 10px">
            <h1><span id="page_title">?</span> <span class="drug_name">?</span></h1>
            <p>
              <span id="hospital_translate"></span> <span id="hospitalName">?</span> · Contact:
              <span id="hospitalContact">?</span>
            </p>
          </div>
        </div>

        <div class="hero-kpis">
          <div class="pill">
            Patient: <strong><span id="patientName">?</span></strong> · ID:
            <strong><span id="patientId">?</span></strong>
          </div>
          <div class="pill">
            DOB: <strong><span id="patientDOB">?</span></strong>
          </div>
          <div class="pill">
            Practitioner: <strong><span id="practitionerName">?</span></strong>
          </div>
        </div>
      </section>

      <!-- SECTIONS -->
      <div class="sections">
        <section class="panel">
          <div class="panel-head">
            <span id="requesting_practi_translate"></span>
            <small><span id="practitionerLocation">?</span></small>
          </div>
          <div class="panel-body">
            <div class="meta">
              <div class="field">
                <div class="label"><span class="email_translation"></span></div>
                <div class="value"><span id="practitionerEmail">?</span></div>
              </div>
              <div class="field">
                <div class="label"><span class="phone_translate"></span></div>
                <div class="value"><span id="practitionerPhone">?</span></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <span id="patient_translation"></span>
            <small><span class="address_translation"></span></small>
          </div>
          <div class="panel-body">
            <div class="meta">
              <div class="field">
                <div class="label">Address</div>
                <div class="value"><span id="patientAddress">?</span></div>
              </div>
              <div class="field">
                <div class="label"><span class="email_translation"></span></div>
                <div class="value"><span id="patientEmail">?</span></div>
              </div>
              <div class="field">
                <div class="label"><span class="phone_translate"></span></div>
                <div class="value"><span id="patientPhone">?</span></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <span>Characteristics</span>
            <small><span id="covariateDate"></span></small>
          </div>
          <div class="panel-body">
            <div id="covariatesContainer" class="cov-table">
              <table>
                <thead>
                  <tr>
                    <th>Covariate</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="covariatesBody"></tbody>
              </table>
            </div>

            <div class="warnings-row">
              <div id="warningsCDSSContainer" class="warnings-section">
                <h3>CDSS Warning</h3>
                <ul id="warningsCDSS"></ul>
              </div>

              <div id="warningsCovariateContainer" class="warnings-section">
                <h3>Covariates Warnings</h3>
                <ul id="warningsCovariateList"></ul>
              </div>

              <div id="warningsSampleContainer" class="warnings-section">
                <h3>Samples Warnings</h3>
                <ul id="warningsSampleList"></ul>
              </div>
            </div>
          </div>
        </section>

        <!-- RESULTS -->
        <section class="results">
          <div class="results-head">
            <span>Results</span>
            <span style="opacity: 0.7; font-weight: 650">Dosage · Samples · Adjustment</span>
          </div>
          <div class="results-body">
            <div id="current_dosage_container"></div>
            <div id="sample_container"></div>
            <div id="adjustmentContent"></div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
